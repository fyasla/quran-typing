# Configuration Netlify — lue automatiquement à l'import du dépôt
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Les pages du Coran et la police ne changent jamais : cache long
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets Vite avec hash dans le nom : immuables
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Le service worker doit toujours être revalidé
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
